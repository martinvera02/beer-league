name: Reset Season

on:
  schedule:
    # Se ejecuta cada día a las 00:00 UTC
    # El propio script comprueba si la temporada ha expirado
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Check and reset season if expired
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/check_and_reset_season" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

      - name: Done
        run: echo "✅ Comprobación de temporada completada"